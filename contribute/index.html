<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Spirit Wolf — Free Ways to Contribute</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0A0F1C; --card:#121830; --primary:#8B5CF6; --text:#E2E8F0; --muted:#94A3B8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Lato',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2rem 1rem; }
    h1, h2 { font-family:'Cinzel',serif; }
    .container { max-width:1000px; width:100%; }
    .hero { text-align:center; padding:2rem 0; }
    .hero h1 { font-size:2.2rem; background:linear-gradient(135deg,var(--primary),#A78BFA); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hero p { color:var(--muted); max-width:550px; margin:0.8rem auto; font-size:1.05rem; line-height:1.6; }
    .nav-link { display:inline-block; margin-bottom:2rem; color:var(--muted); text-decoration:none; font-size:0.9rem; }
    .nav-link:hover { color:var(--primary); }
    .embed-container { background:var(--card); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:1rem; backdrop-filter:blur(12px); }
    .footer-note { text-align:center; color:var(--muted); padding:2rem 0; font-size:0.85rem; }
    .footer-note a { color:var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/spirit-wolf/" class="nav-link">← Back to Gallery</a>
    <div class="hero">
      <h1>Support Spirit Wolf for Free</h1>
      <p>Use these referral links when signing up for tools and services. It costs you nothing, and helps support the Wolfpack.</p>
    </div>
    <div class="embed-container">
      <invitation-user-codes user="dpPacKUXV" layout="grid" dark="true" heading="">
        <a href="https://invitation.codes">Find and share referral codes on Invitation</a> - the referral community.
      </invitation-user-codes>
    </div>
    <p class="footer-note">Only tools we actually use. No spam. <a href="https://spiritwolf.dashery.com/" target="_blank">Check out our merch</a>.</p>
  </div>
  <script defer async src="https://invitation.codes/invitation-widgets.js"></script>
</body>
</html>
