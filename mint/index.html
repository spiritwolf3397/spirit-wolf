<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolfpack Mint | Spirit Wolf</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#0A0F1C; --card:#121830; --primary:#8B5CF6; --primary-glow:rgba(139,92,246,0.4); --text:#E2E8F0; --muted:#94A3B8; --border:rgba(255,255,255,0.08); --success:#10B981; --danger:#EF4444; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Lato',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2rem 1rem; }
h1,h2,h3 { font-family:'Cinzel',serif; }
.container { max-width:900px; width:100%; display:flex; flex-direction:column; gap:2rem; }
.nav { display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; background:var(--card); border:1px solid var(--border); border-radius:16px; backdrop-filter:blur(12px); }
.nav h1 { font-size:1.4rem; background:linear-gradient(135deg,var(--primary),#A78BFA); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.nav a { color:var(--muted); text-decoration:none; font-size:0.9rem; }
.nav a:hover { color:var(--primary); }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
@media(max-width:700px){ .grid{grid-template-columns:1fr;} }
.card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:2rem; backdrop-filter:blur(12px); }
.card:hover { box-shadow:0 0 30px var(--primary-glow); }
.card h2 { font-size:1.2rem; margin-bottom:1rem; }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:0.5rem; padding:0.75rem 1.5rem; border-radius:12px; font-family:'Cinzel',serif; font-weight:600; font-size:0.95rem; cursor:pointer; transition:all 0.2s; border:none; width:100%; }
.btn-primary { background:linear-gradient(135deg,var(--primary),#7C3AED); color:white; }
.btn-primary:hover { box-shadow:0 0 20px var(--primary-glow); transform:translateY(-1px); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-outline { background:transparent; border:1px solid var(--primary); color:var(--primary); }
.btn-outline:hover { background:var(--primary); color:white; }
.status { text-align:center; padding:0.5rem; border-radius:8px; font-size:0.85rem; margin-top:0.5rem; }
.status.success { background:rgba(16,185,129,0.15); color:var(--success); }
.status.error { background:rgba(239,68,68,0.15); color:var(--danger); }
.status.info { background:rgba(139,92,246,0.15); color:var(--primary); }
.supply-bar-bg { background:rgba(255,255,255,0.1); border-radius:8px; height:8px; margin:0.5rem 0; overflow:hidden; }
.supply-bar-fill { background:linear-gradient(90deg,var(--primary),#A78BFA); height:100%; border-radius:8px; transition:width 0.3s; }
input { width:100%; padding:0.75rem; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); margin-bottom:0.75rem; font-size:1rem; }
.sigil-preview { width:100%; aspect-ratio:1; border-radius:12px; border:1px solid var(--border); background:#0d1122; display:flex; align-items:center; justify-content:center; color:var(--muted); margin-bottom:1rem; }
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <h1>Wolfpack Mint</h1>
    <div style="display:flex;gap:1rem;">
      <a href="../">Back to Gallery</a>
      <button class="btn btn-outline" id="connectBtn" style="width:auto;padding:0.5rem 1rem;">Connect Wallet</button>
    </div>
  </nav>
  <div class="grid">
    <!-- WOLFPACK -->
    <div class="card">
      <h2>Wolfpack (ERC-721)</h2>
      <div style="width:100%;aspect-ratio:1;border-radius:12px;overflow:hidden;background:#0d1122;border:1px solid var(--border);margin-bottom:1rem;"><canvas id="previewCanvas" style="width:100%;height:100%;"></canvas></div>
      <button class="btn btn-outline" id="shuffleBtn" style="margin-bottom:1rem;">Shuffle Preview</button>
      <p style="color:var(--muted);font-size:0.9rem;">20 MATIC • Random Traits</p>
      <div class="supply-bar-bg"><div class="supply-bar-fill" id="wolfSupplyBar" style="width:0%"></div></div>
      <p style="font-size:0.8rem;color:var(--muted);"><span id="wolfMinted">0</span>/625</p>
      <button class="btn btn-primary" id="wolfMintBtn" disabled>Mint Wolf</button>
      <div id="wolfStatus"></div>
    </div>
    <!-- SIGIL -->
    <div class="card">
      <h2>Spirit Sigil (ERC-1155)</h2>
      <p style="color:var(--muted);font-size:0.9rem;">5 MATIC • Eternal Spin</p>
      <div class="sigil-preview" style="overflow:hidden;"><img src="https://ipfs.io/ipfs/QmR8DMwURzdmUpQCuDyvZqCnWCAydg8c2KXwtJjNJW4Krx/spiritwolf-sigil-thumb.png" style="width:100%;height:100%;object-fit:cover;" alt="Sigil" onerror="this.style.display=none"/></div>
      <div class="supply-bar-bg"><div class="supply-bar-fill" id="sigilSupplyBar" style="width:0%"></div></div>
      <p style="font-size:0.8rem;color:var(--muted);"><span id="sigilMinted">0</span>/1000</p>
      <input type="number" id="sigilAmount" value="1" min="1" max="10" />
      <button class="btn btn-primary" id="sigilMintBtn" disabled>Mint Sigil</button>
      <div id="sigilStatus"></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.16.0/dist/ethers.umd.min.js"></script>
<script>
const COMPOSITE_CID='QmUkUUUhcs89VkqJzZAhP8wnDHzDwehDSbAri8QGHbChvZ';
function shuffle(){const bg=Math.floor(Math.random()*5);const st=Math.floor(Math.random()*5);const wf=Math.floor(Math.random()*5);const au=Math.floor(Math.random()*5);const combo=bg*125+st*25+wf*5+au;const cv=document.getElementById('previewCanvas');if(!cv)return;const ctx=cv.getContext('2d');const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{cv.width=img.width;cv.height=img.height;ctx.drawImage(img,0,0);};img.src='https://ipfs.io/ipfs/'+COMPOSITE_CID+'/'+combo+'.webp';}

const WOLF_ADDR = '0x461C0dC291FdE5271e2BaB8d7595BD5ec78ce938';
const SIGIL_ADDR = '0xE7c5C37E5962db2Ac6fFDDA650287Fb97A1e5f5d';
const WOLF_ABI = ['function mint() external payable','function totalSupply() external view returns (uint256)','function MINT_PRICE() external view returns (uint256)'];
const SIGIL_ABI = ['function mint(uint256 amount) external payable','function totalMinted() external view returns (uint256)','function MINT_PRICE() external view returns (uint256)'];
let provider, signer, wolfContract, sigilContract, wallet;

async function connect() {
  if(!window.ethereum if(!window.ethereum) return alert(if(!window.ethereum) return alert( !window.rabby) return alert.'Install MetaMask or Rabby');
  await window.ethereum.request({method:'eth_requestAccounts'});
  provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();
  wallet = await signer.getAddress();
  wolfContract = new ethers.Contract(WOLF_ADDR,WOLF_ABI,signer);
  sigilContract = new ethers.Contract(SIGIL_ADDR,SIGIL_ABI,signer);
  document.getElementById('connectBtn').textContent = wallet.slice(0,6)+'...'+wallet.slice(-4);
  document.getElementById('wolfMintBtn').disabled = false;
  document.getElementById('sigilMintBtn').disabled = false;
  await updateStats();
  window.ethereum.on('accountsChanged',()=>location.reload());
  window.ethereum.on('chainChanged',()=>location.reload());
}

async function updateStats(){
  const wt = Number(await wolfContract.totalSupply());
  document.getElementById('wolfMinted').textContent = wt;
  document.getElementById('wolfSupplyBar').style.width = (wt/625*100)+'%';
  const st = Number(await sigilContract.totalMinted());
  document.getElementById('sigilMinted').textContent = st;
  document.getElementById('sigilSupplyBar').style.width = (st/1000*100)+'%';
}

function status(el,msg,type){ el.innerHTML = `<div class="status ${type}">${msg}</div>`; }

async function mintWolf(){
  if(!wolfContract) return;
  const btn = document.getElementById('wolfMintBtn');
  const st = document.getElementById('wolfStatus');
  try {
    btn.disabled=true; btn.textContent='Minting...';
    status(st,'Confirm wallet transaction...','info');
    const price = await provider.call({to:WOLF_ADDR,data:"0xc002d23d"}).then(r=>BigInt(r));
    const tx = await wolfContract.mint({value:price});
    status(st,'Waiting for confirmation...','info');
    await tx.wait();
    status(st,'Wolf minted!','success');
    await updateStats();
  }catch(e){
    if(e.code!=='ACTION_REJECTED') status(st,e.reason||e.message,'error');
  }finally{ btn.disabled=false; btn.textContent='Mint Wolf'; }
}

async function mintSigil(){
  if(!sigilContract) return;
  const amount = parseInt(document.getElementById('sigilAmount').value)||1;
  const btn = document.getElementById('sigilMintBtn');
  const st = document.getElementById('sigilStatus');
  try {
    btn.disabled=true; btn.textContent='Minting...';
    status(st,'Confirm wallet transaction...','info');
    const price = await provider.call({to:SIGIL_ADDR,data:"0xc002d23d"}).then(r=>BigInt(r));
    const tx = await sigilContract.mint(amount,{value:price * BigInt(amount)});
    status(st,'Waiting for confirmation...','info');
    await tx.wait();
    status(st,`${amount} Sigil(s) minted!`,'success');
    await updateStats();
  }catch(e){
    if(e.code!=='ACTION_REJECTED') status(st,e.reason||e.message,'error');
  }finally{ btn.disabled=false; btn.textContent='Mint Sigil'; }
}

document.getElementById('connectBtn').addEventListener('click',connect);
if(document.getElementById('shuffleBtn'))document.getElementById('shuffleBtn').addEventListener('click',shuffle);
shuffle();
document.getElementById('wolfMintBtn').addEventListener('click',mintWolf);
document.getElementById('sigilMintBtn').addEventListener('click',mintSigil);
</script>
</body>
</html>
